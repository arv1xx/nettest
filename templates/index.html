<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetTest</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="layout">

    <!-- САЙДБАР -->
    <aside class="sidebar">
        <div class="logo">
            <span>NetTest <span class="logo-ver">v1.0</span></span>
            <button id="btn-theme" class="btn-theme" onclick="toggleTheme()" title="Переключить тему">☀</button>
        </div>

        <div class="card">
            <div class="card-label">Цель</div>
            <input type="text" id="host" placeholder="example.com или IP" />
            <button onclick="runScan()" id="btn">Запустить ↗</button>
        </div>

        <div class="card">
            <div class="card-label">Модули</div>
            <label class="toggle-row">
                <span>Пинг / задержка</span>
                <input type="checkbox" checked id="m_ping"> 
            </label>
            <label class="toggle-row">
                <span>Сканирование портов</span>
                <input type="checkbox" checked id="m_ports">
            </label>
            <label class="toggle-row">
                <span>SSL-сертификат</span>
                <input type="checkbox" checked id="m_ssl">
            </label>
            <label class="toggle-row">
                <span>HTTP-заголовки</span>
                <input type="checkbox" checked id="m_http">
            </label>
            <label class="toggle-row">
                <span>DDoS-устойчивость</span>
                <input type="checkbox" checked id="m_ddos">
            </label>
            <label class="toggle-row">
                <span>SQL-инъекции</span>
                <input type="checkbox" checked id="m_sql">
            </label>
        </div>

        <div class="card" id="history-card">
            <div class="history-header">
                <div class="card-label" style="margin:0">История</div>
                <div class="history-actions">
                    <button class="btn-csv" onclick="exportCSV()" title="Скачать историю в CSV">CSV ↓</button>
                    <button id="btn-compare" class="btn-compare" style="display:none" onclick="showComparison()">Сравнить</button>
                </div>
            </div>
            <div id="history"></div>
        </div>
    </aside>

    <!-- ОСНОВНАЯ ЧАСТЬ -->
    <main class="main">

        <div class="metrics" id="metrics" style="display:none">
            <div class="metric-card">
                <div class="metric-label">Пинг</div>
                <div class="metric-val" id="m-ping">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Открытых портов</div>
                <div class="metric-val" id="m-ports">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">SSL</div>
                <div class="metric-val" id="m-ssl">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">HTTP статус</div>
                <div class="metric-val" id="m-http">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Security Score</div>
                <div class="metric-val" id="m-score">-</div>
            </div>
        </div>

        <div class="card main-card" id="results-card">
            <div class="results-header">
                <span class="card-label" style="margin:0">Результаты</span>
                <button class="btn-export" onclick="exportPDF()" style="display:none" id="export-btn">Экспорт PDF</button>
            </div>
            <div id="results">
                <div class="placeholder">Введите хост и нажмите «Запустить»</div>
            </div>
        </div>

        <div class="card log-card">
            <div class="card-label">Лог</div>
            <div id="log" class="log"></div>
        </div>

    </main>
</div>

<div id="compare-overlay" onclick="closeCompare()">
    <div id="compare-modal" onclick="event.stopPropagation()">
        <div class="compare-header">
            <span class="card-label" style="margin:0">Сравнение сканов</span>
            <button class="btn-close-compare" onclick="closeCompare()">✕</button>
        </div>
        <div id="compare-body"></div>
    </div>
</div>

<script>
    function initTheme() {
        applyTheme(localStorage.getItem('nettest-theme') || 'dark');
    }

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('btn-theme').textContent = theme === 'dark' ? '☀' : '🌙';
        localStorage.setItem('nettest-theme', theme);
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        applyTheme(current === 'dark' ? 'light' : 'dark');
    }

    function escape(str) {
    if (str === null || str === undefined) return '-';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    let historyEntries = [];
    let selectedForCompare = [];
    let currentScanData = null;

    async function loadHistory() {
        try {
            const res = await fetch('/history?limit=10');
            historyEntries = await res.json();
            renderHistory(historyEntries);
        } catch(e) {}
    }

    function renderHistory(entries) {
        document.getElementById('history').innerHTML = entries.map(e => {
            const date = new Date(e.scanned_at).toLocaleDateString('ru-RU');
            const checked = selectedForCompare.includes(e.id) ? 'checked' : '';
            return `<div class="hist-item" onclick="showSavedScan(${e.id})">
                <input type="checkbox" class="hist-check" ${checked}
                    onclick="event.stopPropagation();toggleCompareSelection(${e.id},this)"
                    title="Выбрать для сравнения">
                <span>${escape(e.host)}</span>
                <span class="hist-date">${date}</span>
                <button class="btn-repeat" title="Повторить скан" onclick="event.stopPropagation();repeatScan(${e.id})">↺</button>
            </div>`;
        }).join('');
        document.getElementById('btn-compare').style.display =
            selectedForCompare.length === 2 ? 'inline-block' : 'none';
    }

    function toggleCompareSelection(id, checkbox) {
        const idx = selectedForCompare.indexOf(id);
        if (idx >= 0) {
            selectedForCompare.splice(idx, 1);
        } else if (selectedForCompare.length < 2) {
            selectedForCompare.push(id);
        } else {
            checkbox.checked = false;
            return;
        }
        document.getElementById('btn-compare').style.display =
            selectedForCompare.length === 2 ? 'inline-block' : 'none';
    }

    function showComparison() {
        const a = historyEntries.find(e => e.id === selectedForCompare[0]);
        const b = historyEntries.find(e => e.id === selectedForCompare[1]);
        if (!a || !b) return;
        document.getElementById('compare-body').innerHTML = buildCompareTable(a, b);
        document.getElementById('compare-overlay').style.display = 'flex';
    }

    function closeCompare() {
        document.getElementById('compare-overlay').style.display = 'none';
    }

    function cmpRow(label, valA, valB, numA, numB, dir) {
        let classA = '', classB = '';
        if (dir !== 'none' && numA !== null && numB !== null && numA !== numB) {
            const aBetter = dir === 'higher' ? numA > numB : numA < numB;
            classA = aBetter ? 'cmp-better' : 'cmp-worse';
            classB = aBetter ? 'cmp-worse' : 'cmp-better';
        }
        return `<tr>
            <td class="cmp-label">${label}</td>
            <td class="${classA}">${escape(valA)}</td>
            <td class="${classB}">${escape(valB)}</td>
        </tr>`;
    }

    function buildCompareTable(a, b) {
        const da = a.results, db = b.results;
        const scoreA = calculateScore(da), scoreB = calculateScore(db);
        const rows = [];

        rows.push(cmpRow('Security Score',
            scoreA !== null ? scoreA + ' / 100' : '—',
            scoreB !== null ? scoreB + ' / 100' : '—',
            scoreA, scoreB, 'higher'));

        const pingA = da.ping && da.ping.status === 'ok' ? da.ping.time_ms : null;
        const pingB = db.ping && db.ping.status === 'ok' ? db.ping.time_ms : null;
        rows.push(cmpRow('Пинг',
            da.ping && da.ping.status !== 'skip' ? (da.ping.status === 'ok' ? da.ping.time_ms + 'ms' : 'недоступен') : '—',
            db.ping && db.ping.status !== 'skip' ? (db.ping.status === 'ok' ? db.ping.time_ms + 'ms' : 'недоступен') : '—',
            pingA, pingB, 'lower'));

        const openA = da.ports ? da.ports.filter(p => p.status === 'open').length : null;
        const openB = db.ports ? db.ports.filter(p => p.status === 'open').length : null;
        rows.push(cmpRow('Открытых портов',
            da.ports && da.ports.length > 0 ? openA + ' / ' + da.ports.length : '—',
            db.ports && db.ports.length > 0 ? openB + ' / ' + db.ports.length : '—',
            null, null, 'none'));

        const sslNumA = da.ssl && da.ssl.status !== 'skip' ? (da.ssl.status === 'ok' ? 1 : 0) : null;
        const sslNumB = db.ssl && db.ssl.status !== 'skip' ? (db.ssl.status === 'ok' ? 1 : 0) : null;
        rows.push(cmpRow('SSL сертификат',
            da.ssl && da.ssl.status !== 'skip' ? (da.ssl.status === 'ok' ? 'Действителен (' + (da.ssl.days_left || '?') + ' д.)' : 'Ошибка') : '—',
            db.ssl && db.ssl.status !== 'skip' ? (db.ssl.status === 'ok' ? 'Действителен (' + (db.ssl.days_left || '?') + ' д.)' : 'Ошибка') : '—',
            sslNumA, sslNumB, 'higher'));

        rows.push(cmpRow('HTTP статус',
            da.http && da.http.status !== 'skip' ? (da.http.status_code || 'ошибка') : '—',
            db.http && db.http.status !== 'skip' ? (db.http.status_code || 'ошибка') : '—',
            null, null, 'none'));

        const ddosA = da.ddos && da.ddos.status !== 'skip' && typeof da.ddos.avg_response_ms === 'number' ? da.ddos.avg_response_ms : null;
        const ddosB = db.ddos && db.ddos.status !== 'skip' && typeof db.ddos.avg_response_ms === 'number' ? db.ddos.avg_response_ms : null;
        rows.push(cmpRow('DDoS — среднее время',
            da.ddos && da.ddos.status !== 'skip' ? (da.ddos.avg_response_ms || '-') + 'ms' : '—',
            db.ddos && db.ddos.status !== 'skip' ? (db.ddos.avg_response_ms || '-') + 'ms' : '—',
            ddosA, ddosB, 'lower'));

        const sqlVulnA = da.sql && da.sql.length > 0 ? da.sql.filter(s => s.status === 'vulnerable').length : null;
        const sqlVulnB = db.sql && db.sql.length > 0 ? db.sql.filter(s => s.status === 'vulnerable').length : null;
        rows.push(cmpRow('SQL уязвимости',
            sqlVulnA !== null ? sqlVulnA + ' найдено' : '—',
            sqlVulnB !== null ? sqlVulnB + ' найдено' : '—',
            sqlVulnA !== null ? -sqlVulnA : null,
            sqlVulnB !== null ? -sqlVulnB : null,
            'higher'));

        const dateA = new Date(a.scanned_at).toLocaleString('ru-RU');
        const dateB = new Date(b.scanned_at).toLocaleString('ru-RU');
        return `<table class="cmp-table">
            <thead>
                <tr>
                    <th>Параметр</th>
                    <th>${escape(a.host)}<br><small>${dateA}</small></th>
                    <th>${escape(b.host)}<br><small>${dateB}</small></th>
                </tr>
            </thead>
            <tbody>${rows.join('')}</tbody>
        </table>`;
    }

    function repeatScan(id) {
        const entry = historyEntries.find(e => e.id === id);
        if (!entry) return;
        document.getElementById('host').value = entry.host;
        runScan();
    }

    function showSavedScan(id) {
        const entry = historyEntries.find(e => e.id === id);
        if (!entry) return;
        currentScanData = { host: entry.host, results: entry.results, scanned_at: entry.scanned_at };
        document.getElementById('host').value = entry.host;
        document.getElementById('log').innerHTML = '';
        document.getElementById('export-btn').style.display = 'inline-block';
        const scannedAt = new Date(entry.scanned_at).toLocaleString('ru-RU');
        updateMetrics(entry.results);
        document.getElementById('metrics').style.display = 'grid';
        document.getElementById('results').innerHTML =
            `<div class="scan-info">История · ${escape(entry.host)} · ${scannedAt}</div>` +
            buildResultsHTML(entry.results);
    }

    function buildResultsHTML(data) {
        let html = '';

        const score = calculateScore(data);
        if (score !== null) {
            const color = scoreColor(score);
            const label = score >= 80 ? 'Хорошая защита' : score >= 60 ? 'Средняя защита' : 'Слабая защита';
            html += `<div class="score-banner">
                <div class="score-banner-val" style="color:${color}">${score}</div>
                <div class="score-banner-info">
                    <div class="score-banner-label">Security Score — ${label}</div>
                    <div class="score-bar-bg">
                        <div class="score-bar-fill" style="width:${score}%;background:${color}"></div>
                    </div>
                </div>
            </div>`;
        }

        const hasPing = data.ping && data.ping.status !== 'skip';
        const hasPorts = data.ports && data.ports.length > 0;
        if (hasPing || hasPorts) {
            html += '<div class="section-label">Сеть</div>';
            if (hasPing)
                html += row('Пинг', data.ping.status === 'ok' ? data.ping.time_ms + 'ms' : 'недоступен', data.ping.status);
            if (hasPorts)
                data.ports.forEach(p => {
                    html += row(`Порт ${p.port} (${p.name})`, p.status === 'open' ? 'открыт' : 'закрыт', p.status === 'open' ? 'ok' : 'err');
                });
        }
        const hasSsl = data.ssl && data.ssl.status !== 'skip';
        const hasHttp = data.http && data.http.status !== 'skip';
        if (hasSsl || hasHttp) {
            html += '<div class="section-label">SSL и заголовки</div>';
            if (hasSsl)
                html += row('SSL сертификат', data.ssl.status === 'ok' ? 'истекает через ' + data.ssl.days_left + ' дней' : 'ошибка', data.ssl.status);
            if (hasHttp) {
                html += row('HTTP статус', data.http.status_code, data.http.status);
                if (data.http.missing_headers)
                    data.http.missing_headers.forEach(h => {
                        const name = h.header || h;
                        const desc = h.desc || '';
                        html += row(name, 'отсутствует' + (desc ? ' - ' + desc : ''), 'warn');
                    });
            }
        }
        if (data.ddos && data.ddos.status !== 'skip') {
            html += '<div class="section-label">DDoS-устойчивость</div>';
            html += row('Среднее время под нагрузкой', (data.ddos.avg_response_ms || '-') + 'ms', data.ddos.status);
            html += row('Успешных запросов', (data.ddos.successful || 0) + ' / ' + data.ddos.requests_sent, data.ddos.errors > 5 ? 'warn' : 'ok');
        }
        if (data.sql && data.sql.length > 0) {
            html += '<div class="section-label">SQL-инъекции</div>';
            data.sql.forEach(s => html += row(escape(s.payload), s.note, s.status));
        }
        return html;
    }

    function calculateScore(data) {
        let earned = 0;
        let possible = 0;

        if (data.ssl && data.ssl.status !== 'skip') {
            possible += 25;
            if (data.ssl.status === 'ok') earned += 25;
        }

        if (data.ports && data.ports.length > 0) {
            const p21 = data.ports.find(p => p.port === 21);
            const p22 = data.ports.find(p => p.port === 22);
            if (p21) { possible += 10; if (p21.status !== 'open') earned += 10; }
            if (p22) { possible += 10; if (p22.status !== 'open') earned += 10; }
        }

        if (data.http && data.http.status !== 'skip' && data.http.status !== 'error') {
            possible += 20;
            const missing = data.http.missing_headers || [];
            if (!missing.includes('Strict-Transport-Security')) earned += 10;
            if (!missing.includes('Content-Security-Policy')) earned += 10;
        }

        if (data.sql && data.sql.length > 0) {
            possible += 20;
            if (!data.sql.some(s => s.status === 'vulnerable')) earned += 20;
        }

        if (data.ddos && data.ddos.status !== 'skip') {
            possible += 15;
            if (data.ddos.status === 'ok') earned += 15;
            else if (data.ddos.status === 'warn') earned += 7;
        }

        if (possible === 0) return null;
        return Math.round((earned / possible) * 100);
    }

    function scoreColor(score) {
        if (score >= 80) return '#4caf7d';
        if (score >= 60) return '#d4a017';
        return '#e05c5c';
    }

    function updateMetrics(data) {
        const pingEl = document.getElementById('m-ping');
        if (!data.ping || data.ping.status === 'skip')
            pingEl.textContent = '-';
        else
            pingEl.textContent = data.ping.status === 'ok' ? data.ping.time_ms + 'ms' : 'недоступен';

        const portsEl = document.getElementById('m-ports');
        if (!data.ports || data.ports.length === 0)
            portsEl.textContent = '-';
        else
            portsEl.textContent = data.ports.filter(p => p.status === 'open').length + ' / ' + data.ports.length;

        const sslEl = document.getElementById('m-ssl');
        if (!data.ssl || data.ssl.status === 'skip') {
            sslEl.textContent = '-';
            sslEl.style.color = '';
        } else {
            sslEl.textContent = data.ssl.status === 'ok' ? 'Действителен' : 'Ошибка';
            sslEl.style.color = data.ssl.status === 'ok' ? '#4caf7d' : '#e05c5c';
        }

        const httpEl = document.getElementById('m-http');
        if (!data.http || data.http.status === 'skip')
            httpEl.textContent = '-';
        else
            httpEl.textContent = data.http.status_code || 'ошибка';

        const scoreEl = document.getElementById('m-score');
        const score = calculateScore(data);
        if (score === null) {
            scoreEl.textContent = '-';
            scoreEl.style.color = '';
        } else {
            scoreEl.textContent = score + ' / 100';
            scoreEl.style.color = scoreColor(score);
        }
    }

    function log(msg) {
        const el = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        el.innerHTML += `<div><span class="log-time">[${time}]</span> ${msg}</div>`;
        el.scrollTop = el.scrollHeight;
    }

    function badge(status) {
        if (status === 'ok') return 'ok';
        if (status === 'warn' || status === 'slow') return 'warn';
        return 'err';
    }

    function row(label, value, status) {
        return `<div class="result-row ${badge(status)}">
            <div class="dot"></div>
            <span class="row-label">${escape(label)}</span>
            <span class="row-val">${escape(value)}</span>
        </div>`;
    }

    async function runScan() {
        const host = document.getElementById('host').value.trim();
        if (!host) return;

        document.getElementById('btn').textContent = 'Проверяем...';
        document.getElementById('btn').disabled = true;
        document.getElementById('results').innerHTML = '<div class="placeholder">Выполняется проверка...</div>';
        document.getElementById('metrics').style.display = 'none';
        document.getElementById('export-btn').style.display = 'none';
        document.getElementById('log').innerHTML = '';

        log(`Запуск проверки -> ${host}`);

        const modules = {
            ping:  document.getElementById('m_ping').checked,
            ports: document.getElementById('m_ports').checked,
            ssl:   document.getElementById('m_ssl').checked,
            http:  document.getElementById('m_http').checked,
            ddos:  document.getElementById('m_ddos').checked,
            sql:   document.getElementById('m_sql').checked,
        };

        try {
            const res = await fetch('/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({host, modules})
            });
            const data = await res.json();

            if (data.error) {
                document.getElementById('results').innerHTML = `<div class="placeholder">${data.error}</div>`;
                return;
            }

            currentScanData = { host, results: data, scanned_at: new Date().toISOString() };
            updateMetrics(data);
            document.getElementById('metrics').style.display = 'grid';

            if (data.ping.status !== 'skip') log('Пинг... ' + (data.ping.time_ms || 'ошибка') + 'ms');
            if (data.ports.length > 0) log('Сканирование портов...');
            if (data.ssl.status !== 'skip') log('Проверка SSL...');
            if (data.http.status !== 'skip') log('Проверка HTTP заголовков...');
            if (data.ddos.status !== 'skip') log('DDoS тест: отправка 20 запросов...');
            if (data.sql.length > 0) log('SQL тест: проверка параметров...');

            document.getElementById('results').innerHTML = buildResultsHTML(data);
            document.getElementById('export-btn').style.display = 'inline-block';

            loadHistory();

        } catch(e) {
            document.getElementById('results').innerHTML = `<div class="placeholder">Ошибка: ${e.message}</div>`;
            log('Ошибка: ' + e.message);
        } finally {
            document.getElementById('btn').textContent = 'Запустить ↗';
            document.getElementById('btn').disabled = false;
        }
    }

    function exportCSV() {
        window.location.href = '/export-csv';
    }

    async function exportPDF() {
        if (!currentScanData) return;
        try {
            const res = await fetch('/export-pdf', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(currentScanData)
            });
            if (!res.ok) { log('Ошибка экспорта PDF'); return; }
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `nettest_${currentScanData.host}_${new Date().toISOString().slice(0,10)}.pdf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } catch(e) {
            log('Ошибка экспорта: ' + e.message);
        }
    }

    document.getElementById('host').addEventListener('keydown', e => {
        if (e.key === 'Enter') runScan();
    });

    initTheme();
    loadHistory();
</script>
</body>
</html>
